# Calls Render POST /api/reviews/fetch with X-Cron-Token (needs secrets API_BASE_URL + CRON_TRIGGER_TOKEN).
# Schedule: ~every 2 days at 03:17 UTC (GitHub cron has no true "every 48h rolling"; see docs/GITHUB_ACTIONS_CRON_SETUP.md).
name: Reviews Fetch Cron

on:
  schedule:
    - cron: "17 3 */2 * *"
  workflow_dispatch:

jobs:
  trigger-fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Validate required secrets
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          CRON_TRIGGER_TOKEN: ${{ secrets.CRON_TRIGGER_TOKEN }}
        run: |
          test -n "$API_BASE_URL" || (echo "Missing API_BASE_URL" && exit 1)
          test -n "$CRON_TRIGGER_TOKEN" || (echo "Missing CRON_TRIGGER_TOKEN" && exit 1)

      - name: Health check
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          set -e
          curl -sS -f "$API_BASE_URL/api/health" | tee /tmp/health.json

      - name: Trigger protected fetch
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          CRON_TRIGGER_TOKEN: ${{ secrets.CRON_TRIGGER_TOKEN }}
        run: |
          set -e
          code=$(curl -sS -o /tmp/fetch.json -w "%{http_code}" \
            -X POST "$API_BASE_URL/api/reviews/fetch" \
            -H "X-Cron-Token: $CRON_TRIGGER_TOKEN" \
            -H "Content-Type: application/json")
          echo "HTTP $code"
          cat /tmp/fetch.json
          test "$code" = "200"
